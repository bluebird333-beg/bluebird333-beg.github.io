<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘의 뉴스</title>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #f5f0e8; --paper: #faf7f2; --ink: #1a1408; --ink-light: #6b6355; --accent: #c0392b; --accent2: #2c3e7a; --border: #d4cfc4; }
    body { background: var(--bg); color: var(--ink); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; }
    .wrap { max-width: 480px; margin: 0 auto; padding: 0 0 40px; }
    header { background: var(--ink); color: #f5f0e8; padding: 20px 20px 16px; position: sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--accent); }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .masthead { font-family: 'Nanum Myeongjo', serif; font-size: 28px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
    .masthead span { color: var(--accent); }
    .date-box { text-align: right; font-size: 10px; color: #a09880; letter-spacing: 1px; line-height: 1.6; }
    .tabs { display: flex; border-top: 1px solid #333; }
    .tab { flex: 1; padding: 8px; text-align: center; font-size: 11px; letter-spacing: 2px; color: #888; cursor: pointer; border: none; background: none; font-family: 'Noto Sans KR', sans-serif; transition: all 0.2s; border-bottom: 2px solid transparent; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .loading { padding: 60px 20px; text-align: center; }
    .loading-spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--ink); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-size: 13px; color: var(--ink-light); letter-spacing: 1px; }
    .news-section { padding: 0 16px; }
    .section-label { display: flex; align-items: center; gap: 10px; padding: 16px 0 10px; font-size: 10px; letter-spacing: 3px; color: var(--ink-light); text-transform: uppercase; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
    .section-label::before { content: ''; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; flex-shrink: 0; }
    .news-main { padding: 14px 0; border-bottom: 2px solid var(--ink); cursor: pointer; transition: opacity 0.2s; }
    .news-main:active { opacity: 0.7; }
    .news-main .category { font-size: 9px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; margin-bottom: 6px; }
    .news-main h2 { font-family: 'Nanum Myeongjo', serif; font-size: 20px; font-weight: 700; line-height: 1.4; margin-bottom: 8px; }
    .news-main .desc { font-size: 12px; color: var(--ink-light); line-height: 1.6; margin-bottom: 8px; }
    .news-main .meta { font-size: 10px; color: #aaa; letter-spacing: 1px; }
    .news-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity 0.2s; align-items: flex-start; }
    .news-item:active { opacity: 0.7; }
    .news-num { font-family: 'Nanum Myeongjo', serif; font-size: 22px; font-weight: 800; color: var(--border); line-height: 1; flex-shrink: 0; width: 24px; padding-top: 2px; }
    .news-content { flex: 1; min-width: 0; }
    .news-content .category { font-size: 9px; letter-spacing: 1px; color: var(--accent2); text-transform: uppercase; margin-bottom: 4px; }
    .news-content h3 { font-size: 14px; font-weight: 500; line-height: 1.45; margin-bottom: 4px; }
    .news-content .meta { font-size: 10px; color: #aaa; }
    .divider { height: 8px; background: var(--border); margin: 8px 0; opacity: 0.3; }
    .error-box { margin: 20px 16px; padding: 16px; background: #fff5f5; border: 1px solid #fcc; border-radius: 4px; font-size: 13px; color: #c0392b; text-align: center; }
    .refresh-btn { display: block; margin: 20px 16px 0; width: calc(100% - 32px); padding: 14px; background: var(--ink); color: var(--bg); border: none; font-family: 'Noto Sans KR', sans-serif; font-size: 12px; letter-spacing: 2px; cursor: pointer; }
    footer { margin-top: 24px; padding: 16px; text-align: center; font-size: 10px; color: var(--border); letter-spacing: 1px; border-top: 1px solid var(--border); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .animate { animation: fadeIn 0.4s ease forwards; opacity: 0; }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="header-top">
      <div class="masthead">오늘의<span>뉴스</span></div>
      <div class="date-box" id="dateBox">로딩 중...</div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('all')">전체</button>
      <button class="tab" onclick="switchTab('kr')">🇰🇷 한국</button>
      <button class="tab" onclick="switchTab('world')">🌍 국제</button>
    </div>
  </header>
  <div id="content">
    <div class="loading"><div class="loading-spinner"></div><p>뉴스를 불러오는 중...</p></div>
  </div>
  <footer>NEWS · RSS FEED · AUTO REFRESH</footer>
</div>
<script>
  function updateDate() {
    const now = new Date();
    const dateStr = now.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
    const timeStr = now.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' });
    document.getElementById('dateBox').innerHTML = dateStr + '<br>' + timeStr + ' 기준';
  }
  updateDate();
